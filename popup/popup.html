<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>絵文字メーカー</h1>

    <div id="no-workspace" class="hidden">
      <p class="hint">Slackをブラウザで開くとワークスペースが表示されます</p>
    </div>

    <div id="main-form" class="hidden">
      <div class="field">
        <label>ワークスペース</label>
        <select id="workspace-select"></select>
      </div>

      <div class="field">
        <label>絵文字名</label>
        <div class="name-wrap">
          <span class="colon">:</span>
          <input type="text" id="emoji-name" placeholder="emoji-name" />
          <span class="colon">:</span>
        </div>
        <p class="hint">英小文字・数字・ハイフン・アンダースコアのみ</p>
      </div>

      <div class="field">
        <label>画像 <span class="hint-inline">（最大128KB）</span></label>
        <div id="drop-zone" class="drop-zone">
          <span id="drop-text">クリックまたはドラッグ＆ドロップ</span>
          <img id="preview" class="hidden" alt="preview" />
          <input type="file" id="file-input" accept="image/*" class="hidden" />
        </div>
      </div>

      <button id="upload-btn" disabled>アップロード</button>

      <div id="status" class="status hidden"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
